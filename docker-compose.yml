services:
  driveledger:
    build: .
    container_name: driveledger
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - driveledger-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  driveledger-data:
    driver: local
