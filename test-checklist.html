  .section-header .badge.done { background: #064e3b; color: var(--green); }
  .section-body { border: 1px solid var(--border); border-top: 0; border-radius: 0 0 .5rem .5rem; padding: .5rem 0; display: none; }
  .section-body.open { display: block; }
  .scenario-desc { font-size: .8rem; color: var(--muted); padding: .5rem 1rem .75rem; border-bottom: 1px solid var(--border); margin-bottom: .5rem; font-style: italic; }
  .step-label { font-size: .75rem; font-weight: 600; color: var(--accent); padding: .5rem 1rem .25rem; }
  .item { display: flex; align-items: flex-start; gap: .5rem; padding: .3rem 1rem; font-size: .8rem; }
  .item:hover { background: #1a1a1e; }
  .item input[type=checkbox] { margin-top: .2rem; accent-color: var(--accent); cursor: pointer; width: 15px; height: 15px; flex-shrink: 0; }
  .item label { cursor: pointer; color: #d4d4d8; flex: 1; }
  .item.checked label { color: var(--muted); text-decoration: line-through; }
  .search { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: .375rem; font-size: .8rem; margin-bottom: 1rem; outline: none; }

  @media print { .controls, .search, .progress-bar { display: none; } .section-body { display: block !important; } .item.checked label { text-decoration: none; color: var(--green); } .item.checked label::before { content: "\2713  "; } }

// ──── Render ────
const root = document.getElementById('app');
const STORE_KEY = 'dl_scenario_checks';
let state = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
let filterMode = false;

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function getTotal() {
  let total = 0, checked = 0;
  DATA.forEach(s => s.steps.forEach(st => st.items.forEach(() => { total++; if (state[total - 1]) checked++; })));
  // recount properly
  total = 0; checked = 0;
  let idx = 0;
  DATA.forEach(s => s.steps.forEach(st => st.items.forEach(() => { if (state[idx]) checked++; total++; idx++; })));
  return { total, checked };
}

function updateProgress() {
  const { total, checked } = getTotal();
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').textContent = pct + '%';
  document.getElementById('stats').textContent = `${checked} / ${total} erledigt`;
  // update badges
  document.querySelectorAll('[data-section]').forEach(sec => {
    const items = sec.querySelectorAll('input[type=checkbox]');
    const done = [...items].filter(i => i.checked).length;
    const badge = sec.querySelector('.badge');
    badge.textContent = `${done}/${items.length}`;
    badge.classList.toggle('done', done === items.length && items.length > 0);
  });
}

function render() {
  let idx = 0;
  let html = '';
  DATA.forEach((section, si) => {
    html += `<section data-section="${si}">`;
    html += `<div class="section-header" onclick="toggleSection(${si})"><h2>${section.title}</h2><span class="badge"></span></div>`;
    html += `<div class="section-body" id="sec_${si}">`;
    if (section.desc) html += `<div class="scenario-desc">${section.desc}</div>`;
    section.steps.forEach(step => {
      html += `<div class="step-label">${step.s}</div>`;
      step.items.forEach(item => {
        const checked = state[idx] ? 'checked' : '';
        const cls = state[idx] ? 'item checked' : 'item';
        html += `<div class="${cls}" data-idx="${idx}"><input type="checkbox" id="c${idx}" ${checked} onchange="toggle(${idx},this)"><label for="c${idx}">${item}</label></div>`;
        idx++;
      });
    });
    html += '</div></section>';
  });
  root.innerHTML = html;
  updateProgress();
}

function toggle(idx, el) {
  state[idx] = el.checked;
  el.closest('.item').classList.toggle('checked', el.checked);
  save();
  updateProgress();
  if (filterMode && el.checked) el.closest('.item').classList.add('hidden');
}

function toggleSection(si) {
  document.getElementById('sec_' + si).classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.section-body').forEach(b => b.classList.toggle('open', open));
}

function resetAll() {
  if (!confirm('Alle Checks zurücksetzen?')) return;
  state = {};
  save();
  render();
}

function filterUnchecked() {
  filterMode = !filterMode;
  document.getElementById('btnFilter').classList.toggle('active', filterMode);
  document.querySelectorAll('.item').forEach(el => {
    const idx = el.dataset.idx;
    el.classList.toggle('hidden', filterMode && state[idx]);
  });
}

document.getElementById('search').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.item').forEach(el => {
    const text = el.querySelector('label').textContent.toLowerCase();
    el.classList.toggle('hidden', q && !text.includes(q));
  });
  document.querySelectorAll('[data-section]').forEach(sec => {
    const visible = sec.querySelectorAll('.item:not(.hidden)').length;
    sec.classList.toggle('hidden', q && visible === 0);
    if (q && visible > 0) sec.querySelector('.section-body').classList.add('open');
  });
});

render();
</script>
