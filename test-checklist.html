  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 1.75rem; margin-bottom: .25rem; }
  .subtitle { color: var(--muted); font-size: .875rem; margin-bottom: 1.5rem; }
  .progress-bar { background: var(--surface); border: 1px solid var(--border); border-radius: .5rem; height: 2rem; margin-bottom: 2rem; overflow: hidden; position: sticky; top: 0; z-index: 100; }
  .progress-fill { background: var(--accent); height: 100%; transition: width .3s; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; min-width: 3rem; }
  .controls { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .controls button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .4rem .75rem; border-radius: .375rem; cursor: pointer; font-size: .75rem; transition: .15s; }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  section { margin-bottom: 1.5rem; }
  .section-header { background: var(--surface); border: 1px solid var(--border); border-radius: .5rem .5rem 0 0; padding: .75rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .section-header:hover { border-color: #3f3f46; }
  .section-header h2 { font-size: .95rem; font-weight: 600; }
  .section-header .badge { font-size: .7rem; background: var(--border); padding: .15rem .5rem; border-radius: 9999px; color: var(--muted); }
  .section-header .badge.done { background: #064e3b; color: var(--green); }
  .section-body { border: 1px solid var(--border); border-top: 0; border-radius: 0 0 .5rem .5rem; padding: .5rem 0; display: none; }
  .section-body.open { display: block; }
  .group-label { font-size: .8rem; font-weight: 600; color: var(--accent); padding: .5rem 1rem .25rem; }
  .item { display: flex; align-items: flex-start; gap: .5rem; padding: .3rem 1rem; font-size: .8rem; }
  .item:hover { background: #1a1a1e; }
  .item input[type=checkbox] { margin-top: .2rem; accent-color: var(--accent); cursor: pointer; width: 15px; height: 15px; flex-shrink: 0; }
  .item label { cursor: pointer; color: #d4d4d8; flex: 1; }
  .item.checked label { color: var(--muted); text-decoration: line-through; }
  .item .tag { font-size: .65rem; padding: .1rem .35rem; border-radius: .2rem; margin-left: .35rem; vertical-align: middle; font-weight: 500; }
  .tag-critical { background: #451a1a; color: var(--red); }
  .tag-scenario { background: #1a1a3e; color: #818cf8; }
  .tag-edge { background: #2a1a00; color: var(--amber); }
  .tag-security { background: #1a0a2e; color: #c084fc; }
  .tag-mobile { background: #0a2a2a; color: #5eead4; }
  .search { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: .375rem; font-size: .8rem; margin-bottom: 1rem; outline: none; }
  .search:focus { border-color: var(--accent); }
  .hidden { display: none !important; }
  @media print { .controls, .search, .progress-bar { display: none; } .section-body { display: block !important; } .item.checked label { text-decoration: none; color: var(--green); } .item.checked label::before { content: "✓ "; } }

let showOnlyUnchecked = false;
const KEY = 'dl-checklist-v1';

function load() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } }
function save(state) { localStorage.setItem(KEY, JSON.stringify(state)); }

function render() {
  const state = load();
  const app = document.getElementById('app');
  let totalItems = 0, checkedItems = 0, html = '';

  DATA.forEach((section, si) => {
    let sectionTotal = 0, sectionChecked = 0;
    let groupsHtml = '';

    section.items.forEach(group => {
      let itemsHtml = '';
      group.items.forEach((raw, ii) => {
        const parts = raw.split('|');
        const text = parts[0];
        const tags = parts.slice(1).map(t => t.replace('tag:', ''));
        const id = `s${si}_${group.g}_${ii}`;
        const checked = !!state[id];
        totalItems++; sectionTotal++;
        if (checked) { checkedItems++; sectionChecked++; }
        if (showOnlyUnchecked && checked) return;
        const tagHtml = tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
        itemsHtml += `<div class="item ${checked ? 'checked' : ''}" data-search="${text.toLowerCase()}">
          <input type="checkbox" id="${id}" ${checked ? 'checked' : ''} onchange="toggle('${id}')">
          <label for="${id}">${text}${tagHtml}</label>
        </div>`;
      });
      if (itemsHtml || !showOnlyUnchecked) {
        const groupTags = group.g.split('|');
        const groupName = groupTags[0];
        const groupTagHtml = groupTags.slice(1).map(t => `<span class="tag tag-${t.replace('tag:', '')}">${t.replace('tag:', '')}</span>`).join('');
        groupsHtml += `<div class="group-label">${groupName} ${groupTagHtml}</div>${itemsHtml}`;
      }
    });

    const badgeClass = sectionChecked === sectionTotal && sectionTotal > 0 ? 'badge done' : 'badge';
    html += `<section data-search="section">
      <div class="section-header" onclick="toggleSection(this)">
        <h2>${section.title}</h2>
        <span class="${badgeClass}">${sectionChecked}/${sectionTotal}</span>
      </div>
      <div class="section-body">${groupsHtml}</div>
    </section>`;
  });

  app.innerHTML = html;
  const pct = totalItems ? Math.round(checkedItems / totalItems * 100) : 0;
  document.getElementById('progressFill').style.width = Math.max(pct, 3) + '%';
  document.getElementById('progressFill').textContent = pct + '%';
  document.getElementById('stats').textContent = `${checkedItems} von ${totalItems} Tests bestanden (${pct}%)`;
}

function toggle(id) {
  const state = load();
  state[id] = !state[id];
  if (!state[id]) delete state[id];
  save(state);
  render();
}

function toggleSection(el) {
  el.nextElementSibling.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.section-body').forEach(b => {
    open ? b.classList.add('open') : b.classList.remove('open');
  });
}

function resetAll() {
  if (confirm('Alle Checks zurücksetzen?')) { localStorage.removeItem(KEY); render(); }
}

function filterUnchecked() {
  showOnlyUnchecked = !showOnlyUnchecked;
  document.getElementById('btnFilter').classList.toggle('active', showOnlyUnchecked);
  render();
}

document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.item').forEach(el => {
    el.classList.toggle('hidden', q && !el.dataset.search.includes(q));
  });
  document.querySelectorAll('section').forEach(sec => {
    const visible = sec.querySelectorAll('.item:not(.hidden)').length;
    if (q) { sec.querySelector('.section-body').classList.toggle('open', visible > 0); }
    sec.classList.toggle('hidden', q && visible === 0);
  });
});

render();
</script>
